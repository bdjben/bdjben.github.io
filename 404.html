<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0b4a43">
  <title>Page not found | Ben Badejo</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: "Manrope";
      src: url("/fonts/manrope-latin-wght-normal.woff2") format("woff2");
      font-style: normal;
      font-weight: 200 800;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      font-family: "Manrope", system-ui, sans-serif;
      background: #eef4f1;
      color: #101817;
    }

    * { box-sizing: border-box; }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 760px);
      border-top: 6px solid #0b685d;
      padding: clamp(32px, 7vw, 72px);
      background: #fff;
      box-shadow: 0 30px 70px rgba(22, 41, 37, 0.12);
    }

    .brand {
      color: #101817;
      font-size: 1.4rem;
      font-weight: 800;
      text-decoration: none;
    }

    .eyebrow { margin: 48px 0 12px; color: #0b685d; font-weight: 800; text-transform: uppercase; }
    h1 { max-width: 620px; margin: 0; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1; letter-spacing: 0; }
    p { max-width: 570px; margin: 24px 0 32px; color: #52615f; font-size: 1.08rem; line-height: 1.6; }
    .button { display: inline-flex; min-height: 48px; align-items: center; padding: 0 20px; border-radius: 5px; background: #0b4a43; color: #fff; font-weight: 800; text-decoration: none; }
    .button:focus-visible { outline: 3px solid #ff775c; outline-offset: 4px; }
  </style>
</head>
<body>
  <main>
    <a class="brand" href="/">Ben Badejo</a>
    <p class="eyebrow">404 · Page not found</p>
    <h1>This route does not exist.</h1>
    <p>The page may have moved, or the address may be incomplete. Return to the homepage to explore applied AI systems, engagements, and selected work.</p>
    <a class="button" href="/">Return home</a>
  </main>
</body>
</html>
