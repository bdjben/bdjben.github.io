<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2560">
<title>Dashboard Demo - CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #0a0e14; }
iframe { border: none; width: 2560px; height: 1440px; transform-origin: top left; display: block; position: absolute; }
</style>
</head>
<body>
<iframe id="dash" src="dashboard.html"></iframe>
<script>
(function() {
  var DASHBOARDS = ['../agenda/', '../crm/', '../project-view/', '../system-monitor/'];
  var currentIdx = 1;
  var frame = document.getElementById('dash');

  function fit() {
    var sx = window.innerWidth / 2560;
    var sy = window.innerHeight / 1440;
    var s = Math.min(sx, sy);
    frame.style.transform = 'scale(' + s + ')';
    frame.style.left = ((window.innerWidth - 2560 * s) / 2) + 'px';
    frame.style.top = ((window.innerHeight - 1440 * s) / 2) + 'px';
  }

  function navigate(delta) {
    window.location.href = DASHBOARDS[(currentIdx + delta + DASHBOARDS.length) % DASHBOARDS.length];
  }

  function isTypingTarget(el) {
    if (!el) return false;
    var tag = (el.tagName || '').toUpperCase();
    return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
  }

  document.addEventListener('keydown', function(e) {
    if (isTypingTarget(document.activeElement)) return;
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      navigate(1);
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      navigate(-1);
    }
  });

  frame.addEventListener('load', function() {
    try {
      frame.contentWindow.focus();
    } catch (e) {}
  });

  fit();
  window.addEventListener('resize', fit);
})();
</script>

</body>
</html>
